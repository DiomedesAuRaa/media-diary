<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Diary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #1a1a1b;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 28px 32px;
            text-align: center;
        }

        header h1 { font-size: 2.2em; margin-bottom: 6px; font-weight: 600; }
        header p { opacity: 0.9; font-size: 0.95em; }

        .media-nav {
            background: #1a1a1b;
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 2px solid #6c5ce7;
        }

        .media-tab {
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .media-tab:hover { background: #333; color: white; }
        .media-tab.active { background: #6c5ce7; color: white; border-color: #6c5ce7; }
        .media-tab.disabled { opacity: 0.35; cursor: not-allowed; }

        .content { padding: 28px 32px; }

        .form-grid {
            display: grid;
            gap: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: #444;
        }

        input[type="text"], input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #6c5ce7;
        }

        .search-wrap { position: relative; }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }

        .search-results.visible { display: block; }

        .search-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }

        .search-item:hover { background: #f5f3ff; }
        .search-item strong { display: block; }
        .search-item span { font-size: 0.85em; color: #666; }

        .search-hint {
            font-size: 0.85em;
            color: #666;
            margin-top: 6px;
        }

        .search-hint.error { color: #c0392b; }

        .preview {
            background: #f8f7ff;
            border: 1px solid #dcd6ff;
            border-radius: 8px;
            padding: 14px 16px;
            display: none;
        }

        .preview.visible { display: block; }
        .preview p { font-size: 0.95em; color: #333; }

        .rating-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .rating-btn {
            width: 42px;
            height: 42px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }

        .rating-btn:hover { border-color: #6c5ce7; }
        .rating-btn.selected {
            background: #6c5ce7;
            color: white;
            border-color: #6c5ce7;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #5a4bd1; }
        .btn-primary:disabled { background: #bbb; cursor: not-allowed; }

        .btn-delete {
            background: transparent;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }

        .btn-delete:hover {
            background: #e74c3c;
            color: white;
        }

        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            font-size: 0.95em;
        }

        .status.visible { display: block; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.warning { background: #fff3cd; color: #856404; }

        .recent {
            margin-top: 36px;
            border-top: 2px solid #f0f0f0;
            padding-top: 24px;
        }

        .recent h2 {
            font-size: 1.2em;
            margin-bottom: 14px;
            color: #333;
        }

        /* Diary search section */
        .diary-search {
            margin-top: 36px;
            border-top: 2px solid #f0f0f0;
            padding-top: 24px;
        }

        .diary-search-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 14px;
        }

        .diary-search-header h2 {
            font-size: 1.2em;
            color: #333;
        }

        .diary-search-count {
            font-size: 0.85em;
            color: #888;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        th {
            color: #666;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .rating-badge {
            display: inline-block;
            background: #6c5ce7;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85em;
        }

        @media (max-width: 600px) {
            .content { padding: 20px 16px; }
            header { padding: 22px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Media Diary</h1>
            <p>Rate what you watch, read, and binge.</p>
        </header>

        <nav class="media-nav" id="mediaNav"></nav>

        <div class="content">
            <div class="form-grid">
                <div class="search-wrap">
                    <label for="titleSearch">Search title</label>
                    <input type="text" id="titleSearch" placeholder="Start typing a title..." autocomplete="off" spellcheck="false">
                    <div class="search-results" id="searchResults"></div>
                    <p class="search-hint" id="searchHint"></p>
                </div>

                <div class="preview" id="preview">
                    <p id="previewText"></p>
                </div>

                <div>
                    <label for="dateRated">Date rated</label>
                    <input type="text" id="dateRated" placeholder="MM/DD/YY" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="numeric">
                </div>

                <div>
                    <label>Rating</label>
                    <div class="rating-row" id="ratingRow"></div>
                </div>

                <div class="actions">
                    <button class="btn-primary" id="saveBtn" disabled>Save entry</button>
                </div>

                <div class="status" id="status"></div>
            </div>

            <section class="diary-search">
                <div class="diary-search-header">
                    <h2>Search diary</h2>
                    <span class="diary-search-count" id="diarySearchCount"></span>
                </div>
                <div class="search-wrap">
                    <input type="text" id="diarySearch" placeholder="Search your entries…" autocomplete="off" spellcheck="false">
                    <p class="search-hint" id="diarySearchHint"></p>
                </div>
                <div id="diarySearchResults" style="margin-top: 14px;"></div>
            </section>

            <section class="recent">
                <h2>Recent entries</h2>
                <div id="recentTable"></div>
            </section>
        </div>
    </div>

    <script>
        let mediaTypes = {};
        let currentType = null;
        let selectedResult = null;
        let selectedRating = null;
        let searchTimer = null;
        let lastSearchResults = [];
        let searchPending = false;

        // Diary search state
        let diarySearchTimer = null;

        // Escape helper for safe injection into raw HTML attributes
        function escapeHtmlAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;');
        }

        function todayMmDdYy() {
            const d = new Date();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const yy = String(d.getFullYear()).slice(-2);
            return `${mm}/${dd}/${yy}`;
        }

        function showStatus(message, kind) {
            const el = document.getElementById('status');
            el.textContent = message;
            el.className = `status visible ${kind}`;
        }

        function clearStatus() {
            const el = document.getElementById('status');
            el.className = 'status';
        }

        function renderRatingButtons() {
            const row = document.getElementById('ratingRow');
            row.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'rating-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => {
                    selectedRating = i;
                    row.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    updateSaveState();
                });
                row.appendChild(btn);
            }
        }

        function renderMediaNav() {
            const nav = document.getElementById('mediaNav');
            nav.innerHTML = '';
            Object.entries(mediaTypes).forEach(([key, config]) => {
                const btn = document.createElement('button');
                btn.className = 'media-tab' + (key === currentType ? ' active' : '');
                btn.textContent = config.label;
                btn.addEventListener('click', () => switchType(key));
                nav.appendChild(btn);
            });
        }

        async function switchType(type) {
            currentType = type;
            selectedResult = null;
            selectedRating = null;
            document.getElementById('titleSearch').value = '';
            document.getElementById('dateRated').value = todayMmDdYy();
            document.getElementById('preview').classList.remove('visible');
            document.getElementById('searchResults').classList.remove('visible');
            document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
            clearStatus();
            // Clear diary search on tab switch
            document.getElementById('diarySearch').value = '';
            document.getElementById('diarySearchHint').textContent = '';
            document.getElementById('diarySearchResults').innerHTML = '';
            document.getElementById('diarySearchCount').textContent = '';
            renderMediaNav();
            updateFormLabels();
            updateSaveState();
            await loadRecent();
        }

        function updateFormLabels() {
            const dateLabel = currentType === 'books' ? 'Date read' : 'Date rated';
            document.querySelector('label[for="dateRated"]').textContent = dateLabel;
            const placeholders = {
                movies: 'Search for a movie…',
                books: 'Search for a book…',
                tv: 'Search for a TV show…',
            };
            document.getElementById('titleSearch').placeholder = placeholders[currentType] || 'Start typing a title…';

            const diaryPlaceholders = {
                movies: 'Search your movie diary…',
                books: 'Search your book diary…',
                tv: 'Search your TV diary…',
            };
            document.getElementById('diarySearch').placeholder = diaryPlaceholders[currentType] || 'Search your entries…';
        }

        function updateSearchHint() {
            const hint = document.getElementById('searchHint');
            const query = document.getElementById('titleSearch').value.trim();
            if (selectedResult) {
                hint.textContent = '';
                hint.className = 'search-hint';
                return;
            }
            if (searchPending) {
                hint.textContent = 'Searching…';
                hint.className = 'search-hint';
                return;
            }
            if (query.length >= 2 && lastSearchResults.length) {
                hint.textContent = lastSearchResults.length === 1
                    ? 'Match found — confirm details below, then save.'
                    : `${lastSearchResults.length} matches — click the one you mean (year and creator shown).`;
                hint.className = 'search-hint';
            } else if (query.length >= 2 && lastSearchResults.length === 0) {
                hint.textContent = 'No matches found — check your connection or try a different spelling.';
                hint.className = 'search-hint error';
            } else {
                hint.textContent = '';
                hint.className = 'search-hint';
            }
        }

        function updateSaveState() {
            const canSave = selectedRating && (
                selectedResult || lastSearchResults.length === 1
            );
            document.getElementById('saveBtn').disabled = !canSave;
            updateSearchHint();
        }

        async function loadTypes() {
            const res = await fetch('/api/types');
            const data = await res.json();
            mediaTypes = data.types;
            currentType = Object.keys(mediaTypes)[0];
            document.getElementById('dateRated').value = todayMmDdYy();
            renderRatingButtons();
            renderMediaNav();
            updateFormLabels();
            await loadRecent();
        }

        async function searchTitles(query) {
            const res = await fetch(`/api/${currentType}/search?q=${encodeURIComponent(query)}`);
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.detail || 'Search failed — is the server running with TMDB_API_KEY set?');
            }
            return data.results || [];
        }

        function renderSearchResults(results) {
            searchPending = false;
            lastSearchResults = results;
            const container = document.getElementById('searchResults');
            container.innerHTML = '';
            if (!results.length) {
                container.classList.remove('visible');
                updateSaveState();
                return;
            }
            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'search-item';
                const headline = item.subtitle || `${item.title}${item.year ? ` (${item.year})` : ''}`;
                const credit = item.director || item.author || item.creator || '';
                const creditLabel = item.director ? 'Directed by' : item.author ? 'By' : item.creator ? 'Created by' : '';
                const blurb = credit && creditLabel ? `${creditLabel} ${credit}` : (item.year ? `Released ${item.year}` : '');
                div.innerHTML = `<strong>${headline}</strong><span>${blurb}</span>`;
                div.addEventListener('click', () => selectResult(item));
                container.appendChild(div);
            });
            container.classList.add('visible');
            if (results.length === 1 && !selectedResult) {
                selectResult(results[0]);
            } else {
                updateSaveState();
            }
        }

        async function resolveSelectedResult() {
            if (selectedResult) return selectedResult;
            const query = document.getElementById('titleSearch').value.trim();
            if (!query) return null;

            if (!lastSearchResults.length) {
                lastSearchResults = await searchTitles(query);
                renderSearchResults(lastSearchResults);
            }

            if (!lastSearchResults.length) return null;
            if (lastSearchResults.length > 1) {
                showStatus('Multiple matches — click the correct movie in the list.', 'warning');
                document.getElementById('searchResults').classList.add('visible');
                return null;
            }

            await selectResult(lastSearchResults[0]);
            return selectedResult;
        }

        async function selectResult(item) {
            selectedResult = item;
            document.getElementById('titleSearch').value = item.title;
            document.getElementById('searchResults').classList.remove('visible');
            updateSaveState();

            const res = await fetch(`/api/${currentType}/lookup/${item.id}`);
            if (!res.ok) {
                showStatus('Could not load metadata for that title.', 'error');
                return;
            }
            const meta = await res.json();
            selectedResult.metadata = meta;

            const config = mediaTypes[currentType];
            const parts = config.api_fields.map(field => `${field}: ${meta[field] || 'Unknown'}`);
            document.getElementById('previewText').textContent = parts.join(' · ');
            document.getElementById('preview').classList.add('visible');
        }

        async function loadRecent() {
            const res = await fetch(`/api/${currentType}/entries?limit=15`);
            const data = await res.json();
            const config = mediaTypes[currentType];
            const entries = data.entries || [];

            if (!entries.length) {
                document.getElementById('recentTable').innerHTML = '<p>No entries yet.</p>';
                return;
            }

            const cols = [config.title_column, ...config.auto_fields, 'Rating'];
            let html = '<table><thead><tr>';
            cols.forEach(c => { html += `<th>${c}</th>`; });
            html += '<th>Actions</th>';
            html += '</tr></thead><tbody>';
            entries.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    if (c === 'Rating') {
                        html += `<td><span class="rating-badge">${row[c]}</span></td>`;
                    } else {
                        html += `<td>${row[c] || ''}</td>`;
                    }
                });

                const rTitle = row[config.title_column];
                const rDate = row[config.auto_fields[0]];
                html += `<td>
                    <button class="btn-delete" data-title="${escapeHtmlAttr(rTitle)}" data-date="${escapeHtmlAttr(rDate)}" onclick="confirmAndExecuteDelete(this)">Delete</button>
                </td>`;

                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('recentTable').innerHTML = html;
        }

        // ── Diary search ──────────────────────────────────────────────────────

        function renderDiaryResults(results, total) {
            const out = document.getElementById('diarySearchResults');
            const count = document.getElementById('diarySearchCount');

            if (!results.length) {
                out.innerHTML = '';
                count.textContent = '';
                return;
            }

            const config = mediaTypes[currentType];
            const cols = [config.title_column, ...config.api_fields, ...config.auto_fields, 'Rating'];

            count.textContent = total === results.length
                ? `${total} result${total === 1 ? '' : 's'}`
                : `showing ${results.length} of ${total}`;

            let html = '<table><thead><tr>';
            cols.forEach(c => { html += `<th>${c}</th>`; });
            html += '<th>Actions</th>';
            html += '</tr></thead><tbody>';
            results.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    html += c === 'Rating'
                        ? `<td><span class="rating-badge">${row[c] || ''}</span></td>`
                        : `<td>${row[c] || ''}</td>`;
                });

                const rTitle = row[config.title_column];
                const rDate = row[config.auto_fields[0]];
                html += `<td>
                    <button class="btn-delete" data-title="${escapeHtmlAttr(rTitle)}" data-date="${escapeHtmlAttr(rDate)}" onclick="confirmAndExecuteDelete(this)">Delete</button>
                </td>`;

                html += '</tr>';
            });
            html += '</tbody></table>';
            out.innerHTML = html;
        }

        document.getElementById('diarySearch').addEventListener('input', (e) => {
            const q = e.target.value.trim();
            const hint = document.getElementById('diarySearchHint');
            const count = document.getElementById('diarySearchCount');

            if (diarySearchTimer) clearTimeout(diarySearchTimer);

            if (q.length < 2) {
                document.getElementById('diarySearchResults').innerHTML = '';
                hint.textContent = '';
                hint.className = 'search-hint';
                count.textContent = '';
                return;
            }

            hint.textContent = 'Searching…';
            hint.className = 'search-hint';

            diarySearchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(
                        `/api/${currentType}/entries/search?q=${encodeURIComponent(q)}&limit=50`
                    );
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    const results = data.results || [];
                    const total = data.total ?? results.length;

                    if (!results.length) {
                        hint.textContent = 'No matches in your diary.';
                        hint.className = 'search-hint';
                        document.getElementById('diarySearchResults').innerHTML = '';
                        count.textContent = '';
                    } else {
                        hint.textContent = '';
                        hint.className = 'search-hint';
                        renderDiaryResults(results, total);
                    }
                } catch (err) {
                    hint.textContent = 'Search failed.';
                    hint.className = 'search-hint error';
                    document.getElementById('diarySearchResults').innerHTML = '';
                    count.textContent = '';
                }
            }, 300);
        });

        // ── Action: Delete Entry Handler ──────────────────────────────────────

        async function confirmAndExecuteDelete(btn) {
            const title = btn.getAttribute('data-title');
            const dateRated = btn.getAttribute('data-date');
            
            if (!confirm(`Are you sure you want to delete the entry for "${title}" logged on ${dateRated}?`)) {
                return;
            }

            clearStatus();
            
            try {
                const res = await fetch(`/api/${currentType}/entries?title=${encodeURIComponent(title)}&date_rated=${encodeURIComponent(dateRated)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();

                if (!res.ok) {
                    showStatus(data.detail || 'Delete failed.', 'error');
                    return;
                }

                showStatus(`Successfully deleted "${title}".`, 'success');
                
                // Reload lists to show updated state
                await loadRecent();
                
                // Dynamically re-trigger diary search query if active
                const searchBox = document.getElementById('diarySearch');
                if (searchBox && searchBox.value.trim().length >= 2) {
                    searchBox.dispatchEvent(new Event('input'));
                }
            } catch (err) {
                showStatus(String(err.message || err), 'error');
            }
        }

        // ── Title search handlers ─────────────────────────────────

        document.getElementById('titleSearch').addEventListener('input', (e) => {
            clearStatus();
            selectedResult = null;
            document.getElementById('preview').classList.remove('visible');
            const query = e.target.value.trim();
            if (searchTimer) clearTimeout(searchTimer);
            if (query.length < 2) {
                searchPending = false;
                lastSearchResults = [];
                document.getElementById('searchResults').classList.remove('visible');
                updateSaveState();
                return;
            }
            searchPending = true;
            lastSearchResults = [];
            document.getElementById('searchResults').classList.remove('visible');
            updateSaveState();
            searchTimer = setTimeout(async () => {
                try {
                    const results = await searchTitles(query);
                    searchPending = false;
                    renderSearchResults(results);
                } catch (err) {
                    searchPending = false;
                    lastSearchResults = [];
                    showStatus(String(err.message || err), 'error');
                    updateSaveState();
                }
            }, 300);
            updateSaveState();
        });

        document.getElementById('titleSearch').addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            if (searchPending) return;
            if (lastSearchResults.length) {
                await selectResult(lastSearchResults[0]);
                return;
            }
            const query = e.target.value.trim();
            if (query.length < 2) return;
            searchPending = true;
            updateSaveState();
            try {
                renderSearchResults(await searchTitles(query));
            } catch (err) {
                searchPending = false;
                showStatus(String(err.message || err), 'error');
                updateSaveState();
            }
        });

        // ── Smart Multi-Strategy Save Listener ──
        document.getElementById('saveBtn').addEventListener('click', async () => {
            if (!selectedRating) return;
            const resolved = await resolveSelectedResult();
            if (!resolved) {
                showStatus('Could not find that title — try picking from the search list.', 'error');
                return;
            }
            clearStatus();
            document.getElementById('saveBtn').disabled = true;

            const payload = {
                title: selectedResult.title,
                rating: selectedRating,
                external_id: selectedResult.id,
                date_rated: document.getElementById('dateRated').value.trim(),
                api_values: selectedResult.metadata || null,
            };

            async function executePost(bodyData) {
                const res = await fetch(`/api/${currentType}/entries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData),
                });

                if (res.status === 409) {
                    const updateChoice = confirm(
                        `'${bodyData.title}' is already in your diary.\n\nDo you want to OVERWRITE and update your existing rating/date?`
                    );

                    if (updateChoice) {
                        bodyData.strategy = "update";
                        return executePost(bodyData);
                    } else {
                        const rewatchChoice = confirm(
                            `Would you like to log this as a brand new REWATCH entry instead?\n(Click Cancel to abort entirely)`
                        );
                        if (rewatchChoice) {
                            bodyData.strategy = "rewatch";
                            return executePost(bodyData);
                        } else {
                            return null; 
                        }
                    }
                }
                return res;
            }

            const response = await executePost(payload);
            document.getElementById('saveBtn').disabled = false;

            if (response === null) {
                clearStatus();
                return;
            }

            const data = await response.json();

            if (!response.ok) {
                showStatus(data.detail || 'Save failed.', 'error');
                return;
            }

            let message = data.status === 'updated' 
                ? `Updated rating for ${selectedResult.title} to (${selectedRating}/10).`
                : `Saved ${selectedResult.title} (${selectedRating}/10).`;

            if (data.git_sync && data.git_sync.enabled && data.git_sync.last_error) {
                message += ` Git sync issue: ${data.git_sync.last_error}`;
                showStatus(message, 'warning');
            } else {
                showStatus(message, 'success');
            }

            selectedResult = null;
            selectedRating = null;
            document.getElementById('titleSearch').value = '';
            document.getElementById('preview').classList.remove('visible');
            document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
            updateSaveState();
            await loadRecent();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrap')) {
                document.getElementById('searchResults').classList.remove('visible');
            }
        }, true);

        loadTypes().catch(err => showStatus(String(err), 'error'));
    </script>
</body>
</html>
