<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Diary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient: linear-gradient(135deg, #0d0b18 0%, #130f26 100%);
            --card-bg: #1c1836;
            --header-gradient: linear-gradient(135deg, #5f27cd, #341f97);
            --text-main: #f1f2f6;
            --text-muted: #a5a1c2;
            --accent: #ff5252;
            --accent-hover: #ff7675;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: #120e24;
            --item-hover: rgba(255, 255, 255, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background: var(--bg-gradient);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        header {
            background: var(--header-gradient);
            color: white;
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        header h1 { font-size: 2.4em; margin-bottom: 6px; font-weight: 700; letter-spacing: -0.5px; }
        header p { opacity: 0.85; font-size: 1.05em; }

        .sync-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.75em;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
        }
        .sync-badge.synced { color: #2ed573; border-color: rgba(46,213,115,0.2); }
        .sync-badge.error { color: #ff4757; border-color: rgba(255,71,87,0.2); }

        .media-nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-tab {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .media-tab:hover { color: var(--text-main); background: var(--item-hover); }
        .media-tab.active { background: #5f27cd; color: white; border-color: #5f27cd; box-shadow: 0 0 12px rgba(95, 39, 205, 0.4); }

        .workspace { padding: 32px; display: flex; flex-direction: column; gap: 32px; }

        .section-title { font-size: 1.2em; margin-bottom: 16px; font-weight: 600; color: var(--text-main); }

        .entry-card {
            background: rgba(0,0,0,0.15);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .form-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-end; }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .form-group.tight { flex: 0 0 140px; }

        label { font-size: 0.85em; color: var(--text-muted); font-weight: 500; }

        .search-wrap { position: relative; width: 100%; }

        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95em;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: #5f27cd;
            box-shadow: 0 0 0 3px rgba(95, 39, 205, 0.2);
        }

        .dropdown-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #1c1836;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
        }
        .dropdown-panel.visible { display: block; }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.15s;
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover, .dropdown-item.highlighted { background: rgba(255,255,255,0.06); }
        .dropdown-item .item-title { font-weight: 600; font-size: 0.95em; margin-bottom: 2px; }
        .dropdown-item .item-sub { font-size: 0.8em; color: var(--text-muted); }

        .rating-grid { display: flex; gap: 6px; width: 100%; }
        .rating-btn {
            flex: 1;
            padding: 12px 0;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.15s;
        }
        .rating-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-main); }
        .rating-btn.selected { background: #5f27cd; color: white; border-color: #5f27cd; box-shadow: 0 0 8px rgba(95,39,205,0.3); }

        .action-bar { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; align-items: center; }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

        .preview-box {
            background: rgba(95, 39, 205, 0.08);
            border: 1px dashed rgba(95, 39, 205, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
        }
        .preview-box.visible { display: block; }
        .preview-grid { display: flex; flex-wrap: wrap; gap: 16px 24px; }
        .preview-item { display: flex; flex-direction: column; gap: 2px; }
        .preview-label { font-size: 0.75em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .preview-value { font-size: 0.95em; font-weight: 500; }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stats { color: var(--text-muted); font-size: 0.9em; font-weight: 500; }
        
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            max-width: 520px;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { color: var(--text-muted); font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background: rgba(0,0,0,0.1); }
        tr:hover td { background: var(--item-hover); }

        .rating-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85em;
            text-align: center;
            border: 1px solid transparent;
        }
        .rating-tier-high { background: rgba(46, 213, 115, 0.15); color: #2ed573; border-color: rgba(46, 213, 115, 0.2); }
        .rating-tier-mid { background: rgba(112, 111, 211, 0.25); color: #9c88ff; border-color: rgba(112, 111, 211, 0.3); }
        .rating-tier-low { background: rgba(255, 127, 80, 0.15); color: #ff7f50; border-color: rgba(255, 127, 80, 0.2); }

        .btn-delete {
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.15s;
        }
        .btn-delete:hover { background: #ff4757; color: white; border-color: #ff4757; }

        .status-msg {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            display: none;
            margin-bottom: 16px;
        }
        .status-msg.success { background: rgba(46, 213, 115, 0.15); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.2); display: block; }
        .status-msg.warning { background: rgba(25ffa, 165, 2, 0.15); color: #ffa502; border: 1px solid rgba(255, 165, 2, 0.2); display: block; }
        .status-msg.error { background: rgba(255, 71, 87, 0.15); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.2); display: block; }

        /* Dialog Box Component Context */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: #1c1836;
            border: 1px solid var(--border-color);
            border-radius: 12px; width: 100%; max-width: 480px; padding: 28px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transform: scale(0.95); transition: transform 0.2s ease;
        }
        .modal-overlay.visible .modal-card { transform: scale(1); }
        .modal-header { font-size: 1.25em; font-weight: 700; margin-bottom: 12px; }
        .modal-body { font-size: 0.95em; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text-main); }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #ff6b81; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Media Diary</h1>
            <p>Log entries and sync structural content indices.</p>
            <div class="sync-badge" id="syncStatus">Git status lookup...</div>
        </header>

        <nav class="media-nav" id="mediaNav"></nav>

        <div class="workspace">
            <div class="entry-card">
                <div class="section-title">Log New Rating</div>
                <div id="statusBox" class="status-msg"></div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="titleSearch">Search Title</label>
                        <div class="search-wrap">
                            <input type="text" id="titleSearch" placeholder="Type to fetch metadata matching context..." autocomplete="off">
                            <div id="searchResults" class="dropdown-panel"></div>
                        </div>
                    </div>
                </div>

                <div id="preview" class="preview-box">
                    <div class="preview-grid" id="previewGrid"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Your Score Valuation</label>
                        <div class="rating-grid" id="ratingGrid"></div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-primary" id="saveBtn" disabled>Save Diary Entry</button>
                </div>
            </div>

            <div>
                <div class="controls-row">
                    <div class="stats" id="stats">Loading historical cache index...</div>
                    <div class="filter-group">
                        <input type="text" id="tableSearchBox" placeholder="Filter recent local ledger records..." style="max-width: 300px; padding: 10px 14px; font-size: 0.9em;">
                        <select id="sortSelect" style="max-width: 200px; padding: 10px 14px; font-size: 0.9em; cursor: pointer;">
                            <option value="date-desc">Recent First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="rating-desc">Highest Rated</option>
                            <option value="rating-asc">Lowest Rated</option>
                        </select>
                    </div>
                </div>
                <div class="table-wrap" id="tableWrap"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <div class="modal-header" id="modalTitle">Confirm Action</div>
            <div class="modal-body" id="modalDescription">Are you sure you want to alter the dataset with this transaction parameter configuration?</div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
                <button class="btn btn-danger" id="modalConfirmBtn">Proceed</button>
            </div>
        </div>
    </div>

    <script>
        let typesConfig = {};
        let currentType = 'movies';
        let cachedEntries = [];
        
        let selectedResult = null;
        let selectedRating = null;
        let searchTimeout = null;
        let highlightedIndex = -1;

        // Sorting tracking state configurations mirroring GHA layout
        let currentSortOrder = 'date-desc';

        function showStatus(text, type = 'success') {
            const box = document.getElementById('statusBox');
            box.textContent = text;
            box.className = `status-msg ${type}`;
            if (type === 'success') {
                setTimeout(() => { box.className = 'status-msg'; }, 6000);
            }
        }

        function getRatingBadgeClass(ratingStr) {
            const val = parseInt(ratingStr, 10);
            if (isNaN(val)) return 'rating-tier-mid';
            if (val >= 8) return 'rating-tier-high';
            if (val >= 5) return 'rating-tier-mid';
            return 'rating-tier-low';
        }

        async function loadTypes() {
            const res = await fetch('/api/types');
            const data = await res.json();
            typesConfig = data.types;
            
            const badge = document.getElementById('syncStatus');
            if (data.git_sync && data.git_sync.enabled) {
                if (data.git_sync.last_ok) {
                    badge.textContent = 'Git Synced';
                    badge.className = 'sync-badge synced';
                } else if (data.git_sync.last_error) {
                    badge.textContent = 'Git Sync Error';
                    badge.className = 'sync-badge error';
                    badge.title = data.git_sync.last_error;
                } else {
                    badge.textContent = 'Git Monitoring Active';
                    badge.className = 'sync-badge';
                }
            } else {
                badge.textContent = 'Local Mode Only';
                badge.className = 'sync-badge';
            }

            renderNav();
            setupRatingGrid();
            await loadRecent();
        }

        function renderNav() {
            const nav = document.getElementById('mediaNav');
            nav.innerHTML = '';
            Object.entries(typesConfig).forEach(([key, cfg]) => {
                const btn = document.createElement('button');
                btn.className = 'media-tab' + (key === currentType ? ' active' : '');
                btn.textContent = cfg.label;
                btn.addEventListener('click', async () => {
                    currentType = key;
                    resetForm();
                    renderNav();
                    await loadRecent();
                });
                nav.appendChild(btn);
            });
        }

        function setupRatingGrid() {
            const grid = document.getElementById('ratingGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'rating-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => {
                    selectedRating = i;
                    document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    updateSaveState();
                });
                grid.appendChild(btn);
            }
        }

        function resetForm() {
            selectedResult = null;
            selectedRating = null;
            document.getElementById('titleSearch').value = '';
            document.getElementById('preview').classList.remove('visible');
            document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('tableSearchBox').value = '';
            updateSaveState();
        }

        function updateSaveState() {
            document.getElementById('saveBtn').disabled = !(selectedResult && selectedRating);
        }

        function handleSearchInput() {
            clearTimeout(searchTimeout);
            const q = document.getElementById('titleSearch').value.trim();
            const panel = document.getElementById('searchResults');
            
            if (!q) {
                panel.classList.remove('visible');
                return;
            }

            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/${currentType}/search?q=${encodeURIComponent(q)}`);
                    if (!res.ok) return;
                    const items = await res.json();
                    renderDropdown(items);
                } catch (err) {
                    console.error(err);
                }
            }, 250);
        }

        function renderDropdown(items) {
            const panel = document.getElementById('searchResults');
            panel.innerHTML = '';
            highlightedIndex = -1;

            if (!items.length) {
                panel.classList.remove('visible');
                return;
            }

            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = `
                    <div class="item-title">${item.title}</div>
                    <div class="item-sub">${item.subtitle || item.year || ''}</div>
                `;
                div.addEventListener('click', () => selectItem(item));
                panel.appendChild(div);
            });
            panel.classList.add('visible');
        }

        function handleSearchKeydown(e) {
            const panel = document.getElementById('searchResults');
            const items = panel.querySelectorAll('.dropdown-item');
            if (!panel.classList.contains('visible') || !items.length) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightedIndex = (highlightedIndex + 1) % items.length;
                updateDropdownHighlight(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightedIndex = (highlightedIndex - 1 + items.length) % items.length;
                updateDropdownHighlight(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (highlightedIndex >= 0 && highlightedIndex < items.length) {
                    items[highlightedIndex].click();
                }
            } else if (e.key === 'Escape') {
                panel.classList.remove('visible');
            }
        }

        function updateDropdownHighlight(items) {
            items.forEach((item, idx) => {
                if (idx === highlightedIndex) {
                    item.classList.add('highlighted');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('highlighted');
                }
            });
        }

        function selectItem(item) {
            selectedResult = item;
            document.getElementById('titleSearch').value = item.title;
            document.getElementById('searchResults').classList.remove('visible');
            
            const pGrid = document.getElementById('previewGrid');
            pGrid.innerHTML = '';
            
            const cfg = typesConfig[currentType];
            const labels = [...cfg.auto_fields, ...cfg.api_fields];
            
            labels.forEach(label => {
                let val = '';
                if (label === 'Date Watched/Rated' || label === 'Date Read/Rated') {
                    const today = new Date();
                    val = `${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}/${String(today.getFullYear()).slice(-2)}`;
                } else {
                    const lookupKey = Object.keys(item).find(k => k.toLowerCase() === label.toLowerCase());
                    val = lookupKey ? item[lookupKey] : '';
                }

                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<span class="preview-label">${label}</span><span class="preview-value">${val || '—'}</span>`;
                pGrid.appendChild(div);
            });

            document.getElementById('preview').classList.add('visible');
            updateSaveState();
        }

        async function loadRecent() {
            const wrap = document.getElementById('tableWrap');
            try {
                // Request a higher retrieval allowance so local client-side sort handles a broader historical scope
                const res = await fetch(`/api/${currentType}/entries?limit=150`);
                if (!res.ok) throw new Error('Failed loading current media ledger database entries.');
                const data = await res.json();
                cachedEntries = data.entries || [];
                renderTableRecords();
            } catch (err) {
                wrap.innerHTML = `<div style="padding:20px; color:#ff4757;">Error: ${err.message}</div>`;
            }
        }

        function renderTableRecords() {
            const wrap = document.getElementById('tableWrap');
            const stats = document.getElementById('stats');
            const cfg = typesConfig[currentType];
            if (!cfg) return;

            let records = [...cachedEntries];
            const query = document.getElementById('tableSearchBox').value.trim().toLowerCase();

            // 1. FILTERING
            if (query) {
                records = records.filter(row => {
                    return cfg.columns.some(col => row[col] && String(row[col]).toLowerCase().includes(query));
                });
            }

            // 2. SORTING ENGINE EXTENSION SYNCHRONIZED FROM PAGES VIEW ARCHITECTURE
            const trackingDateColumn = cfg.columns[1]; // Resolves dynamic rating activity timestamp
            records.sort((a, b) => {
                if (currentSortOrder === 'rating-desc') {
                    return (Number(b.Rating) || 0) - (Number(a.Rating) || 0);
                } else if (currentSortOrder === 'rating-asc') {
                    return (Number(a.Rating) || 0) - (Number(b.Rating) || 0);
                } else if (currentSortOrder === 'date-asc') {
                    return new Date(a[trackingDateColumn] || 0) - new Date(b[trackingDateColumn] || 0);
                } else { // 'date-desc'
                    return new Date(b[trackingDateColumn] || 0) - new Date(a[trackingDateColumn] || 0);
                }
            });

            // Calculate current runtime stats
            const numericRatings = records.map(r => Number(r.Rating)).filter(n => !isNaN(n));
            const averageValuation = numericRatings.length ? (numericRatings.reduce((x, y) => x + y, 0) / numericRatings.length).toFixed(1) : '—';
            stats.textContent = `${records.length} records mapped · average value: ${averageValuation}/10`;

            if (!records.length) {
                wrap.innerHTML = `<p style="padding: 24px; color: var(--text-muted); text-align: center;">No matches found in active log context view index.</p>`;
                return;
            }

            let html = '<table><thead><tr>';
            cfg.columns.forEach(col => { html += `<th>${col}</th>`; });
            html += '<th style="text-align: right;">Actions</th></tr></thead><tbody>';

            records.forEach(row => {
                html += '<tr>';
                cfg.columns.forEach(col => {
                    if (col === 'Rating') {
                        const badgeClass = getRatingBadgeClass(row[col]);
                        html += `<td><span class="rating-badge ${badgeClass}">${row[col] || ''}/10</span></td>`;
                    } else {
                        html += `<td>${row[col] || ''}</td>`;
                    }
                });
                
                const safeTitle = (row[cfg.title_column] || '').replace(/'/g, "\\'");
                const safeDate = (row[cfg.columns[1]] || '').replace(/'/g, "\\'");
                html += `<td style="text-align: right;"><button class="btn-delete" onclick="promptDelete('${safeTitle}', '${safeDate}')">Delete</button></td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        function triggerModal(title, description, onConfirm) {
            const overlay = document.getElementById('confirmModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDescription').textContent = description;
            
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');
            
            const cleanup = () => {
                overlay.classList.remove('visible');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => { onConfirm(); cleanup(); };
            cancelBtn.onclick = () => { cleanup(); };
            overlay.classList.add('visible');
        }

        function promptDelete(title, dateRated) {
            triggerModal(
                'Delete Diary Entry',
                `Are you certain you wish to completely remove the record entry for "${title}" logged on ${dateRated}? This rewrite transaction will cascade into tracked remote components upon completion.`,
                async () => {
                    try {
                        const targetUrl = `/api/${currentType}/entries?title=${encodeURIComponent(title)}&date_rated=${encodeURIComponent(dateRated)}`;
                        const res = await fetch(targetUrl, { method: 'DELETE' });
                        const payload = await res.json();
                        
                        if (!res.ok) throw new Error(payload.detail || 'Failed processing entry disposal route parameters.');
                        showStatus(`Successfully expunged record index for ${title}.`);
                        await loadRecent();
                    } catch (err) {
                        showStatus(err.message, 'error');
                    }
                }
            );
        }

        async function commitSave(forcedStrategy = null) {
            const saveBtn = document.getElementById('saveBtn');
            const originalBtnText = saveBtn.textContent;
            
            saveBtn.disabled = true;
            saveBtn.textContent = 'Storing entry...';

            try {
                const payload = {
                    title: selectedResult.title,
                    rating: parseInt(selectedRating, 10),
                    external_id: String(selectedResult.id),
                    strategy: forcedStrategy
                };

                const res = await fetch(`/api/${currentType}/entries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.status === 409 && data.strategy_required) {
                    saveBtn.disabled = false;
                    saveBtn.textContent = originalBtnText;

                    triggerModal(
                        'Duplicate Title Found',
                        `"${selectedResult.title}" already contains active record metrics inside your repository workspace. Would you prefer to log this as a standard new separate interaction history entry (Rewatch/Reread) or overwrite the evaluation context score metric for your historical record?`,
                        () => commitSave('rewatch'), // Confirm mapping handler maps to rewatch
                        () => commitSave('update')  // Secondary track pathways map to update strategies
                    );
                    
                    // Remap choice targets temporarily inside contextual dialogue triggers
                    document.getElementById('modalConfirmBtn').textContent = 'Log as Rewatch';
                    document.getElementById('modalCancelBtn').removeAttribute('class');
                    document.getElementById('modalCancelBtn').className = 'btn btn-primary';
                    document.getElementById('modalCancelBtn').style.background = '#5f27cd';
                    document.getElementById('modalCancelBtn').textContent = 'Overwrite Score';
                    
                    // Modify close button mapping behaviors to act as secondary selection channels
                    document.getElementById('modalCancelBtn').onclick = () => {
                        document.getElementById('confirmModal').classList.remove('visible');
                        commitSave('update');
                    };
                    return;
                }

                if (!res.ok) {
                    showStatus(data.detail || 'Save routine aborted on validation exception checks.', 'error');
                    return;
                }

                let message = data.status === 'updated' 
                    ? `Updated rating context valuation metrics for ${selectedResult.title} to (${selectedRating}/10).`
                    : `Successfully appended record metric data ledger values for ${selectedResult.title} (${selectedRating}/10).`;

                if (data.git_sync && data.git_sync.enabled && data.git_sync.last_error) {
                    message += ` Git distribution failure: ${data.git_sync.last_error}`;
                    showStatus(message, 'warning');
                } else {
                    showStatus(message, 'success');
                }

                resetForm();
                await loadRecent();

            } catch (err) {
                showStatus(String(err), 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = originalBtnText;
                
                // Re-standardize confirmation system configurations following modal exits
                document.getElementById('modalCancelBtn').removeAttribute('style');
                document.getElementById('modalCancelBtn').className = 'btn btn-secondary';
                document.getElementById('modalCancelBtn').textContent = 'Cancel';
                document.getElementById('modalConfirmBtn').textContent = 'Proceed';
            }
        }

        // Standard Hook Event Registries
        document.getElementById('titleSearch').addEventListener('input', handleSearchInput);
        document.getElementById('titleSearch').addEventListener('keydown', handleSearchKeydown);
        document.getElementById('saveBtn').addEventListener('click', () => commitSave(null));
        document.getElementById('tableSearchBox').addEventListener('input', renderTableRecords);
        
        // Connect event listener to execute full sorting engine recalculations dynamically on toggle changes
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSortOrder = e.target.value;
            renderTableRecords();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrap')) {
                document.getElementById('searchResults').classList.remove('visible');
            }
        }, true);

        loadTypes().catch(err => showStatus(String(err), 'error'));
    </script>
</body>
</html>
