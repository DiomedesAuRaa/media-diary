<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Diary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient: linear-gradient(135deg, #0d0b18 0%, #130f26 100%);
            --card-bg: #1c1836;
            --header-gradient: linear-gradient(135deg, #5f27cd, #341f97);
            --text-main: #f1f2f6;
            --text-muted: #a5a1c2;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: #120e24;
            --item-hover: rgba(255, 255, 255, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background: var(--bg-gradient);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        header {
            background: var(--header-gradient);
            color: white;
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 { font-size: 2.4em; margin-bottom: 6px; font-weight: 700; letter-spacing: -0.5px; }
        header p { opacity: 0.85; font-size: 1.05em; }

        .media-nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
        }

        .media-tab {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .media-tab:hover:not(.disabled) { color: var(--text-main); background: var(--item-hover); }
        .media-tab.active { background: #5f27cd; color: white; border-color: #5f27cd; box-shadow: 0 0 12px rgba(95, 39, 205, 0.4); }
        .media-tab.disabled { opacity: 0.25; cursor: default; }

        .content { padding: 32px; }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stats {
            color: var(--text-muted);
            font-size: 0.95em;
            font-weight: 500;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            max-width: 520px;
        }

        .search-box, .sort-select {
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95em;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        .search-box { flex: 2; }
        .sort-select { flex: 1; cursor: pointer; }

        .search-box:focus, .sort-select:focus {
            border-color: #5f27cd;
            box-shadow: 0 0 0 3px rgba(95, 39, 205, 0.2);
        }

        .table-wrap { 
            overflow-x: auto; 
            max-height: 70vh; 
            overflow-y: auto; 
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        th, td {
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            color: var(--text-muted);
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            background: #1f1b3a; /* Solid offset color to remain legible while scrolling */
            border-bottom: 2px solid var(--border-color);
            z-index: 10;
        }

        tr:hover td { background: var(--item-hover); }

        /* Tiered Badges Mirroring write-app */
        .rating-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85em;
            text-align: center;
            border: 1px solid transparent;
        }
        .rating-tier-high { background: rgba(46, 213, 115, 0.15); color: #2ed573; border-color: rgba(46, 213, 115, 0.2); }
        .rating-tier-mid { background: rgba(112, 111, 211, 0.25); color: #9c88ff; border-color: rgba(112, 111, 211, 0.3); }
        .rating-tier-low { background: rgba(255, 127, 80, 0.15); color: #ff7f50; border-color: rgba(255, 127, 80, 0.2); }

        .error {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Media Diary</h1>
            <p>Read-only archive of rated media collections.</p>
        </header>

        <nav class="media-nav" id="mediaNav"></nav>

        <div class="content">
            <div class="controls-row">
                <div class="stats" id="stats"></div>
                <div class="filter-group">
                    <input type="text" id="searchBox" class="search-box" placeholder="Search entries...">
                    <select id="sortSelect" class="sort-select">
                        <option value="date-desc">Recent First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="rating-desc">Highest Rated</option>
                        <option value="rating-asc">Lowest Rated</option>
                    </select>
                </div>
            </div>
            
            <div class="table-wrap" id="tableWrap"></div>
        </div>
    </div>

    <script>
        const TYPES = {
            movies: {
                label: 'Movies',
                json: 'movies.json',
                columns: ['Movie', 'Date Watched/Rated', 'Date Released', 'Rating', 'Director'],
                enabled: true,
            },
            books: {
                label: 'Books',
                json: 'books.json',
                columns: ['Book', 'Date Read/Rated', 'Date Published', 'Rating', 'Author'],
                enabled: true,
            },
            tv: {
                label: 'TV Shows',
                json: 'tv.json',
                columns: ['Show', 'Date Watched/Rated', 'Date Premiered', 'Rating', 'Creator'],
                enabled: true,
            },
        };

        let currentType = 'movies';
        let cache = {};
        let searchQuery = ''; 
        let sortOrder = 'date-desc'; // Default sorting mode tracks date backwards

        function renderNav() {
            const nav = document.getElementById('mediaNav');
            nav.innerHTML = '';
            Object.entries(TYPES).forEach(([key, config]) => {
                const btn = document.createElement('button');
                btn.className = 'media-tab' + (key === currentType ? ' active' : '') + (config.enabled ? '' : ' disabled');
                btn.textContent = config.label + (config.enabled ? '' : ' (soon)');
                if (config.enabled) {
                    btn.addEventListener('click', () => {
                        currentType = key;
                        document.getElementById('searchBox').value = '';
                        searchQuery = '';
                        
                        renderNav();
                        renderTable();
                    });
                }
                nav.appendChild(btn);
            });
        }

        async function loadData(type) {
            if (cache[type]) return cache[type];
            const config = TYPES[type];
            const res = await fetch(config.json);
            if (!res.ok) throw new Error(`Could not load ${config.json}`);
            const data = await res.json();
            cache[type] = data.entries || [];
            return cache[type];
        }

        // Helper function mapping dynamic tiers to CSS design styles
        function getRatingBadgeClass(ratingStr) {
            const val = parseInt(ratingStr, 10);
            if (isNaN(val)) return 'rating-tier-mid';
            if (val >= 8) return 'rating-tier-high';
            if (val >= 5) return 'rating-tier-mid';
            return 'rating-tier-low';
        }

        async function renderTable() {
            const wrap = document.getElementById('tableWrap');
            const stats = document.getElementById('stats');
            const config = TYPES[currentType];

            try {
                let entries = [...(await loadData(currentType))]; // Clone array to preserve core cache orders
                
                // 1. FILTERING LOGIC
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    entries = entries.filter(row => {
                        return config.columns.some(col => {
                            const val = row[col];
                            return val && String(val).toLowerCase().includes(query);
                        });
                    });
                }

                // 2. NEW SORTING ENGINE
                const dateColumnName = config.columns[1]; // Evaluates the primary logging tracking date column
                entries.sort((a, b) => {
                    if (sortOrder === 'rating-desc') {
                        return (Number(b.Rating) || 0) - (Number(a.Rating) || 0);
                    } else if (sortOrder === 'rating-asc') {
                        return (Number(a.Rating) || 0) - (Number(b.Rating) || 0);
                    } else if (sortOrder === 'date-asc') {
                        return new Date(a[dateColumnName] || 0) - new Date(b[dateColumnName] || 0);
                    } else { // 'date-desc'
                        return new Date(b[dateColumnName] || 0) - new Date(a[dateColumnName] || 0);
                    }
                });

                const ratings = entries.map(e => Number(e.Rating)).filter(n => !Number.isNaN(n));
                const avg = ratings.length ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : '—';
                
                const searchSuffix = searchQuery ? ' matching search' : '';
                stats.textContent = `${entries.length} entries${searchSuffix} · average rating ${avg}`;

                if (!entries.length) {
                    wrap.innerHTML = '<p style="color: var(--text-muted); padding: 24px; text-align: center;">No matching ledger entries found in this view index.</p>';
                    return;
                }

                let html = '<table><thead><tr>';
                config.columns.forEach(col => { html += `<th>${col}</th>`; });
                html += '</tr></thead><tbody>';
                entries.forEach(row => {
                    html += '<tr>';
                    config.columns.forEach(col => {
                        if (col === 'Rating') {
                            const badgeClass = getRatingBadgeClass(row[col]);
                            html += `<td><span class="rating-badge ${badgeClass}">${row[col] || ''}/10</span></td>`;
                        } else {
                            html += `<td>${row[col] || ''}</td>`;
                        }
                    });
                    html += '</tr>';
                });
                html += '</tbody></table>';
                wrap.innerHTML = html;
            } catch (err) {
                wrap.innerHTML = `<div class="error">${err.message}</div>`;
                stats.textContent = '';
            }
        }

        // EVENT REGISTRIES
        document.getElementById('searchBox').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTable(); 
        });

        document.getElementById('sortSelect').addEventListener('change', (e) => {
            sortOrder = e.target.value;
            renderTable();
        });

        renderNav();
        renderTable();
    </script>
</body>
</html>
